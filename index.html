<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Analysis Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px 0;
            border-bottom: 1px solid #334155;
        }

        h1 {
            font-size: clamp(24px, 5vw, 36px);
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #475569;
            background: #0f172a;
        }

        .card h3 {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #cbd5e1;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="password"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #60a5fa;
            background: #1e293b;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .analysis-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
        }

        .analysis-section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #60a5fa;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #94a3b8;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #334155;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .output {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 16px;
            margin-top: 12px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .error {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            border-left: 4px solid #dc2626;
        }

        .success {
            background: #1f2937;
            color: #86efac;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            border-left: 4px solid #22c55e;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            border-bottom: 1px solid #334155;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 10px 16px;
            background: transparent;
            color: #94a3b8;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            width: auto;
        }

        .tab-button.active {
            color: #60a5fa;
            border-bottom-color: #60a5fa;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .metric {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
        }

        .metric-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 16px;
            color: #60a5fa;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 24px;
            }

            .card {
                padding: 16px;
            }

            .tabs {
                gap: 8px;
            }

            .tab-button {
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Trading Analysis Agent</h1>
            <p class="subtitle">AI-powered market analysis for BTC & Polymarket</p>
        </header>

        <div class="grid">
            <!-- Configuration Card -->
            <div class="card">
                <h3>⚙️ Configuration</h3>
                <div class="input-group">
                    <label for="apiKey">Claude API Key</label>
                    <input 
                        type="password" 
                        id="apiKey" 
                        placeholder="sk-..." 
                        required
                    >
                    <small style="color: #64748b; margin-top: 4px; display: block;">
                        Get yours at <a href="https://console.anthropic.com" target="_blank" style="color: #60a5fa;">console.anthropic.com</a>
                    </small>
                </div>
                <div class="input-group">
                    <label for="model">Model</label>
                    <select id="model">
                        <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet (Recommended)</option>
                        <option value="claude-3-opus-20250219">Claude 3 Opus</option>
                        <option value="claude-3-haiku-20240307">Claude 3 Haiku (Fast)</option>
                    </select>
                </div>
            </div>

            <!-- Market Data Card -->
            <div class="card">
                <h3>📈 Market Data</h3>
                <div class="input-group">
                    <label for="btcPrice">BTC Price (USD)</label>
                    <input 
                        type="number" 
                        id="btcPrice" 
                        placeholder="45000" 
                        step="0.01"
                    >
                </div>
                <div class="input-group">
                    <label for="volatility">Volatility (%)</label>
                    <input 
                        type="number" 
                        id="volatility" 
                        placeholder="2.5" 
                        step="0.1"
                    >
                </div>
                <div class="input-group">
                    <label for="fundingRate">Funding Rate (%)</label>
                    <input 
                        type="number" 
                        id="fundingRate" 
                        placeholder="0.05" 
                        step="0.01"
                    >
                </div>
            </div>

            <!-- Polymarket Card -->
            <div class="card">
                <h3>🎲 Polymarket</h3>
                <div class="input-group">
                    <label for="marketQuestion">Market Question</label>
                    <input 
                        type="text" 
                        id="marketQuestion" 
                        placeholder="Will BTC reach $50k by end of Q2?" 
                    >
                </div>
                <div class="input-group">
                    <label for="currentOdds">Current Odds (%)</label>
                    <input 
                        type="number" 
                        id="currentOdds" 
                        placeholder="65" 
                        min="0" 
                        max="100" 
                        step="0.1"
                    >
                </div>
            </div>
        </div>

        <!-- Custom Analysis Card -->
        <div class="card">
            <h3>🔍 Custom Analysis</h3>
            <div class="input-group">
                <label for="customPrompt">Additional Context or Questions</label>
                <textarea 
                    id="customPrompt" 
                    placeholder="Describe market conditions, news events, or specific questions you want analyzed..."
                ></textarea>
            </div>
            <button onclick="analyzeMarkets()">Analyze Markets</button>
        </div>

        <!-- Results Section -->
        <div class="analysis-section">
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('analysis')">Analysis</button>
                <button class="tab-button" onclick="switchTab('raw')">Raw Response</button>
            </div>

            <div id="analysis" class="tab-content active">
                <div id="analysisOutput"></div>
            </div>

            <div id="raw" class="tab-content">
                <div id="rawOutput"></div>
            </div>
        </div>
    </div>

    <script>
        // Initialize with saved API key from localStorage
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('anthropic_api_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }
        });

        async function analyzeMarkets() {
            const apiKey = document.getElementById('apiKey').value;
            
            if (!apiKey) {
                showError('Please enter your Claude API key');
                return;
            }

            // Save API key to localStorage
            localStorage.setItem('anthropic_api_key', apiKey);

            const marketData = {
                btcPrice: document.getElementById('btcPrice').value || 'Not provided',
                volatility: document.getElementById('volatility').value || 'Not provided',
                fundingRate: document.getElementById('fundingRate').value || 'Not provided',
                polymarketQuestion: document.getElementById('marketQuestion').value || 'Not provided',
                currentOdds: document.getElementById('currentOdds').value || 'Not provided',
                customContext: document.getElementById('customPrompt').value || 'No additional context',
            };

            const prompt = buildPrompt(marketData);
            
            showLoading();

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                    },
                    body: JSON.stringify({
                        model: document.getElementById('model').value,
                        max_tokens: 2000,
                        messages: [
                            {
                                role: 'user',
                                content: prompt,
                            },
                        ],
                    }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API request failed');
                }

                const data = await response.json();
                const analysisText = data.content[0].text;

                displayAnalysis(analysisText, prompt);
            } catch (error) {
                showError(`Error: ${error.message}`);
            }
        }

        function buildPrompt(data) {
            return `You are an elite BTC and Polymarket trading agent operating at PhD-level expertise in blockchain, market microstructure, probability theory, quantitative finance, macroeconomics, and on-chain analytics. Your objective is to maximize risk-adjusted returns while preserving capital.

CURRENT MARKET DATA:
- BTC Price: $${data.btcPrice}
- Volatility: ${data.volatility}%
- Funding Rate: ${data.fundingRate}%

POLYMARKET ANALYSIS:
- Market Question: ${data.polymarketQuestion}
- Current Odds: ${data.currentOdds}%

USER CONTEXT:
${data.customContext}

Based on this data, provide:

1. **Market Assessment** - Current market structure and key drivers
2. **BTC Analysis** - Technical, on-chain, and macro analysis with confidence levels
3. **Polymarket Opportunity** - Probability evaluation, edge identification, expected value
4. **Trade Recommendations** - Entry/exit points, position sizing, risk/reward (if applicable)
5. **Key Risks** - What could go wrong, tail risks to monitor
6. **Next Steps** - Data to monitor, decision points ahead

Keep analysis precise, quantitative, and evidence-based. Acknowledge uncertainty. Flag assumptions.`;
        }

        function displayAnalysis(response, prompt) {
            const analysisOutput = document.getElementById('analysisOutput');
            const rawOutput = document.getElementById('rawOutput');

            // Format analysis with markdown-like styling
            const formatted = response
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            analysisOutput.innerHTML = `
                <div class="success">✅ Analysis complete</div>
                <div class="output" style="margin-top: 16px;">
                    <p>${formatted}</p>
                </div>
            `;

            rawOutput.innerHTML = `
                <div style="margin-bottom: 16px;">
                    <strong>Prompt Sent:</strong>
                    <div class="output" style="margin-top: 8px;">${prompt.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                </div>
                <div>
                    <strong>Raw Response:</strong>
                    <div class="output" style="margin-top: 8px;">${response}</div>
                </div>
            `;
        }

        function showLoading() {
            document.getElementById('analysisOutput').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>Analyzing markets...</span>
                </div>
            `;
            document.getElementById('rawOutput').innerHTML = '';
        }

        function showError(message) {
            document.getElementById('analysisOutput').innerHTML = `<div class="error">${message}</div>`;
        }

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Allow Enter key in custom prompt
        document.getElementById('customPrompt')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                analyzeMarkets();
            }
        });

        // Allow Enter on number inputs (except textarea)
        ['btcPrice', 'volatility', 'fundingRate', 'currentOdds'].forEach(id => {
            document.getElementById(id)?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    analyzeMarkets();
                }
            });
        });
    </script>
</body>
</html>
